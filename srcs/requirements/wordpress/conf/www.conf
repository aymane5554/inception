[www]

; The user and group php-fpm runs as
user = nobody
group = nobody

; CRITICAL: Listen on all interfaces on port 9000
; NOT a unix socket — nginx is in a different container
listen = 0.0.0.0:9000

; Who is allowed to connect to this socket
listen.owner = nobody
listen.group = nobody
listen.mode = 0660

; Process management
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3